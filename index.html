<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Upload CSV/XLSX and generate dark-themed PPTX slides." />
  <title>CSV/XLSX to Slides</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>CSV/XLSX → PPTX</h1>
      <p class="subtitle">Upload a semicolon CSV or XLSX file and generate a downloadable PowerPoint.</p>

      <label class="field">
        <span>Input file (.csv, .xlsx, .xls)</span>
        <input id="fileInput" type="file" accept=".csv,.xlsx,.xls,.txt" />
      </label>

      <label class="field">
        <span>Output file name</span>
        <input id="outputName" type="text" value="news-slides.pptx" />
      </label>

      <button id="generateBtn" type="button">Generate PPTX</button>

      <div id="status" class="status" aria-live="polite">Ready.</div>

      <details>
        <summary>Expected columns</summary>
        <ul>
          <li>Id</li>
          <li>Title</li>
          <li>Associated Lance</li>
          <li>Associated Deliverable</li>
          <li>Publication Date</li>
          <li>Text (HTML supported)</li>
        </ul>
      </details>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script src="script.js"></script>
</body>
</html>
